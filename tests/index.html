<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TROY Sandbox — Rules Engine Test Runner</title>
    <style>
        :root {
            --pass: #16a34a;
            --pass-bg: #dcfce7;
            --fail: #dc2626;
            --fail-bg: #fee2e2;
            --info: #2563eb;
            --border: #e5e7eb;
            --text: #1f2937;
            --text-muted: #6b7280;
            --bg: #f9fafb;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 24px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: var(--text);
            background: var(--bg);
            line-height: 1.5;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 22px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .subtitle a {
            color: var(--info);
            text-decoration: none;
        }
        .subtitle a:hover { text-decoration: underline; }

        .summary {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px 24px;
            border-radius: 8px;
            margin-bottom: 24px;
            border: 2px solid;
        }

        .summary.all-pass {
            background: var(--pass-bg);
            border-color: var(--pass);
            color: var(--pass);
        }

        .summary.has-fail {
            background: var(--fail-bg);
            border-color: var(--fail);
            color: var(--fail);
        }

        .summary-icon {
            font-size: 28px;
            font-weight: bold;
        }

        .summary-headline {
            font-size: 18px;
            font-weight: 600;
        }

        .summary-sub {
            font-size: 13px;
            opacity: 0.85;
        }

        .group {
            background: white;
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 8px;
            overflow: hidden;
        }

        .group summary {
            list-style: none;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            cursor: pointer;
            user-select: none;
            font-weight: 500;
        }

        .group summary::-webkit-details-marker { display: none; }

        .group summary:hover {
            background: var(--bg);
        }

        .group-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            font-size: 13px;
            font-weight: bold;
            color: white;
        }

        .group-pass .group-icon { background: var(--pass); }
        .group-fail .group-icon { background: var(--fail); }

        .group-name {
            flex: 1;
        }

        .group-counts {
            font-size: 13px;
            color: var(--text-muted);
            font-variant-numeric: tabular-nums;
        }

        .tests {
            list-style: none;
            margin: 0;
            padding: 0;
            border-top: 1px solid var(--border);
        }

        .test {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 16px 10px 50px;
            border-top: 1px solid var(--border);
            font-size: 14px;
        }

        .test:first-child { border-top: none; }

        .test-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            font-size: 11px;
            font-weight: bold;
            color: white;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .test-pass .test-icon { background: var(--pass); }
        .test-fail .test-icon { background: var(--fail); color: white; }

        .test-pass {
            color: var(--text);
        }

        .test-fail {
            background: var(--fail-bg);
        }

        .test-name {
            flex: 1;
            min-width: 200px;
        }

        .test-error {
            width: 100%;
            margin: 8px 0 0;
            padding: 10px 12px;
            background: rgba(0, 0, 0, 0.04);
            border-left: 3px solid var(--fail);
            border-radius: 4px;
            font-size: 12.5px;
            line-height: 1.5;
            white-space: pre-wrap;
            overflow-x: auto;
            font-family: ui-monospace, 'SF Mono', Menlo, monospace;
            color: var(--fail);
        }

        .loading {
            padding: 40px;
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Rules Engine Test Runner</h1>
        <p class="subtitle">
            Validates <code>js/design-rules.js</code> and <code>js/color-config.js</code> against the
            canonical <a href="../../troy-vp-reskin-v2/reskin-docs/TROY%20Web%20Reskin%20CSS%20Ruleset.md" target="_blank">TROY Web Reskin CSS Ruleset</a>.
            See <a href="../docs/DESIGN-RULES.md" target="_blank">docs/DESIGN-RULES.md</a> for which rules are enforced.
        </p>

        <div id="results">
            <div class="loading">Running tests…</div>
        </div>
    </div>

    <script type="module" src="rules-engine.test.js"></script>
</body>
</html>
